name: test image-first deploy

on:
  push:
    branches:
      - test

env:
  ARTIFACT_FILE: artifacts/app-${{ github.sha }}.tar.gz
  IMAGE_TAG: ${{ vars.REGISTRY_NAME }}/${{ vars.IMAGE_NAME }}:test-${{ github.sha }}
  DEPLOY_DIR: /home/${{ vars.EC2_USER || 'ubuntu' }}/book-shop/test

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test
        uses: actions/checkout@v4
        with:
          ref: test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build fresh application artifact
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
          ALLOWED_HOSTS: "*"
        run: bash scripts/build_artifact.sh "${{ github.sha }}" artifacts

      - name: Build image from fresh artifact
        run: docker build --build-arg ARTIFACT_FILE="${ARTIFACT_FILE}" -t "${IMAGE_TAG}" .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to registry
        run: docker push "${IMAGE_TAG}"

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/default.conf"
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy test on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ env.DEPLOY_DIR }}"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull "${{ env.IMAGE_TAG }}"
            cat > .env <<EOF
            APP_IMAGE=${{ env.IMAGE_TAG }}
            APP_PORT=${{ vars.TEST_PORT || '8002' }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS || '*' }}
            POSTGRES_DB=${{ vars.POSTGRES_DB || 'bookshop_test' }}
            POSTGRES_USER=${{ vars.POSTGRES_USER || 'bookshop' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EOF
            if ! docker compose version >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi
            docker compose -p bookshop-test down --remove-orphans
            docker compose -p bookshop-test up -d
