name: Dev Pipeline (Artifact-First)

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build artifact
        run: |
          ARTIFACT_NAME="app-${{ github.sha }}.tar.gz"
          mkdir -p artifacts
          tar -czf artifacts/$ARTIFACT_NAME \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='artifacts' \
            --warning=no-file-changed \
            . || true
          echo "ARTIFACT_NAME=app-${{ github.sha }}.tar.gz" >> $GITHUB_ENV

      - name: Commit artifact to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: add artifact ${{ env.ARTIFACT_NAME }}"
          file_pattern: "artifacts/"

      - name: Build Docker image from artifact
        run: |
          docker build \
            --build-arg ARTIFACT_NAME=${{ env.ARTIFACT_NAME }} \
            -t bookshop:dev-${{ github.sha }} \
            .

      - name: Save Docker image
        run: |
          docker save bookshop:dev-${{ github.sha }} | gzip > bookshop-dev.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "bookshop-dev.tar.gz"
          target: "/tmp/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker compose -p dev down || true

            docker load < /tmp/bookshop-dev.tar.gz

            cat > /home/ubuntu/dev.env << EOF
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            POSTGRES_DB=bookshop_dev
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ALLOWED_HOSTS=${{ vars.EC2_HOST }},localhost
            EOF

            cat > /home/ubuntu/docker-compose.dev.yml << EOF
            services:
              db:
                image: postgres:15
                container_name: dev_db
                restart: always
                environment:
                  POSTGRES_DB: bookshop_dev
                  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                volumes:
                  - dev_postgres_data:/var/lib/postgresql/data
                networks:
                  - dev_network

              backend:
                image: bookshop:dev-${{ github.sha }}
                container_name: dev_backend
                restart: always
                env_file:
                  - /home/ubuntu/dev.env
                depends_on:
                  - db
                ports:
                  - "8001:8000"
                command: >
                  sh -c "python manage.py migrate &&
                         python manage.py runserver 0.0.0.0:8000"
                networks:
                  - dev_network

            volumes:
              dev_postgres_data:

            networks:
              dev_network:
                driver: bridge
            EOF

            docker compose -p dev -f /home/ubuntu/docker-compose.dev.yml up -d