- name: Deploy prod on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_REF: ${{ env.IMAGE_REF }}
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_REF
          script: |
            set -e
            IMAGE_REF=$(echo "$IMAGE_REF" | tr -d '[:space:]')
            cd "/home/ubuntu/book-shop/prod"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull "$IMAGE_REF"
            cat > .env <<EOF
            APP_IMAGE=$IMAGE_REF
            APP_PORT=${{ vars.PROD_PORT || '8000' }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS || '*' }}
            POSTGRES_DB=${{ vars.POSTGRES_DB || 'bookshop_prod' }}
            POSTGRES_USER=${{ vars.POSTGRES_USER || 'bookshop' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EOF
            docker compose -p bookshop-prod down --remove-orphans
            docker compose -p bookshop-prod up -d
