services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookshop_network

  backend:
    image: ${APP_IMAGE:?APP_IMAGE must be set}
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - bookshop_network

  nginx:
    image: nginx:1.25-alpine
    restart: always
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bookshop_network

volumes:
  postgres_data:

networks:
  bookshop_network:
    driver: bridge
